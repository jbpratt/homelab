apiVersion: v1
kind: ConfigMap
metadata:
  name: homeassistant-config
data:
  configuration.yaml: |
    homeassistant:
      name: Home
      unit_system: metric
      time_zone: America/New_York

    http:
      use_x_forwarded_for: true
      trusted_proxies:
        - 10.128.0.0/14
        - 10.244.0.0/16
        - 127.0.0.1

    default_config:

    automation:
      - alias: "Daily Backup"
        trigger:
          - platform: time
            at: "03:00:00"
        action:
          - service: backup.create
      - id: notify_garage_door_state_change
        alias: "Notify Garage Door State Change"
        trigger:
          - platform: state
            entity_id: cover.garage_door
        condition:
          - condition: template
            value_template: >-
              {{ trigger.from_state is not none
                 and trigger.to_state is not none
                 and trigger.from_state.state != trigger.to_state.state
                 and trigger.to_state.state not in ['unknown', 'unavailable'] }}
        action:
          - service: notify.send_message
            target:
              entity_id: notify.bradys_iphone
            data:
              title: "Garage Door"
              message: >-
                Garage door changed from {{ trigger.from_state.state | replace('_', ' ') }}
                to {{ trigger.to_state.state | replace('_', ' ') }}.
        mode: single
